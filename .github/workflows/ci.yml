name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type check
        run: npm run lint
      - name: Run tests
        run: npm run test
        env:
          ENCRYPTION_KEY: test-encryption-key-for-ci-only-32chars!
          APP_URL: http://localhost:3000
      - name: Build
        run: npm run build
